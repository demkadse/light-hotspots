<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FFXIV RP Events</title>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<header class="site-header">
<h1>FFXIV RP Events</h1>
<p>Diese Woche fuer euch</p>
</header>

<main>
<div id="timeline-container">
<div id="timeline-track"></div>
</div>
</main>

<div class="timeline-controls" aria-label="Tagesnavigation">
<button id="nav-prev" type="button" aria-label="Vorheriger Tag">Zurueck</button>
<button id="nav-next" type="button" aria-label="Naechster Tag">Weiter</button>
</div>

<div id="event-modal" aria-hidden="true">
<div class="modal-overlay"></div>
<div class="modal-window" role="dialog" aria-modal="true" aria-labelledby="modal-title">
<button id="modal-close" type="button" aria-label="Modal schliessen">x</button>
<div id="modal-content"></div>
</div>
</div>

<script src="js/events.js"></script>
<script src="js/modal.js"></script>
<script src="js/siteConfig.js"></script>
<script src="js/carousel.js"></script>
<script src="js/timeline.js"></script>
</body>
</html>
